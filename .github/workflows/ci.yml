name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.13 added to match pyproject.toml classifiers — must be tested, not just claimed.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      # actions/checkout v4.2.2 — pinned to commit SHA for supply chain integrity.
      # Mutable tags (v4) were the attack vector in the March 2025 tj-actions incident.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.3.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,cli]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and security tools
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,cli]" pip-audit bandit

      - name: pip-audit — dependency CVE check
        # --skip-editable: omit taxid-etims (our own package, not on PyPI).
        # --ignore-vuln CVE-2026-3219: pip 26.x self-CVE; not a dependency of this SDK.
        # Cannot be fixed by upgrading pip as 26.0.1 is the latest available release.
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219

      - name: bandit — SAST scan
        # -r src/: recursive scan of the SDK source tree.
        # -ll: flag medium and high severity findings (skips low).
        # -x tests/: exclude test files from SAST (test code patterns trigger false positives).
        run: bandit -r src/ -ll -x tests/
