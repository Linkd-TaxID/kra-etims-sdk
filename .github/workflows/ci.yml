name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.13 added to match pyproject.toml classifiers — must be tested, not just claimed.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      # actions/checkout v4.2.2 — pinned to commit SHA for supply chain integrity.
      # Mutable tags (v4) were the attack vector in the March 2025 tj-actions incident.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.3.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit — dependency CVE check
        # Audits all installed packages against the Python Advisory Database (PyPA).
        # Fails the job if any known vulnerability is found. Use --ignore-vuln
        # sparingly and only with a documented justification.
        run: pip-audit --require-hashes -r <(pip-compile pyproject.toml --output-file /dev/stdout 2>/dev/null || pip install -e . && pip freeze) || pip-audit

      - name: bandit — SAST scan
        # -r src/: recursive scan of the SDK source tree.
        # -ll: flag medium and high severity findings (skips low).
        # -x tests/: exclude test files from SAST (test code patterns trigger false positives).
        run: bandit -r src/ -ll -x tests/
