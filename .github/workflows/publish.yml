name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  # -----------------------------------------------------------------------
  # Version consistency gate
  # Asserts the GitHub release tag exactly matches the version in
  # pyproject.toml before any build or publish step runs. A release tag
  # that doesn't match the package version is rejected immediately.
  # -----------------------------------------------------------------------
  version-check:
    name: Version consistency gate
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2 — pinned to commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Assert tag matches pyproject.toml version
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present (e.g. v0.2.0 → 0.2.0)
          TAG_VERSION="${RELEASE_TAG#v}"
          TOML_VERSION=$(python3 - <<'EOF'
          import tomllib, sys
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          echo "Release tag version : ${TAG_VERSION}"
          echo "pyproject.toml version: ${TOML_VERSION}"
          if [ "${TAG_VERSION}" != "${TOML_VERSION}" ]; then
            echo "ERROR: Release tag '${TAG_VERSION}' does not match pyproject.toml version '${TOML_VERSION}'." >&2
            echo "Bump version in pyproject.toml and retag the release." >&2
            exit 1
          fi
          echo "Version check passed: ${TAG_VERSION}"

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: version-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.3.0 — pinned to commit SHA.
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,cli]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  security:
    name: Security scan
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit — dependency CVE check
        # --skip-editable: omit taxid-etims (not on PyPI).
        # --ignore-vuln CVE-2026-3219: pip 26.x self-CVE; not a dependency of this SDK.
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-3219

      - name: bandit — SAST scan
        run: bandit -r src/ -ll -x tests/

  build:
    name: Build distribution
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-python v5.3.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist and wheel
        run: |
          pip install build
          find . -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          python -m build

      # actions/upload-artifact v4.4.3 — pinned to commit SHA.
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      # actions/download-artifact v4.1.8 — pinned to commit SHA.
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/

      # pypa/gh-action-pypi-publish v1.14.0 — OIDC trusted publishing.
      # Upgraded from v1.11.0: v1.11.0 used twine 4.x which rejects Metadata-Version 2.4
      # (generated by setuptools >= 72). v1.14.0 uses twine 5.x which accepts it.
      # No API token or password — authentication is via GitHub's OIDC provider.
      # PyPI project must be configured to trust this repository + environment.
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
